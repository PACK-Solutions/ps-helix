<div class="checkbox-container">
  <label class="checkbox-label" [class.label-left]="labelPosition() === 'left'">
    <input
      #checkboxInput
      type="checkbox"
      class="checkbox-input"
      [checked]="checked()"
      [disabled]="disabled()"
      [required]="required()"
      [attr.aria-label]="computedAriaLabel()"
      [attr.aria-checked]="ariaChecked()"
      [attr.aria-describedby]="ariaDescribedBy()"
      (change)="toggle()"
      (keydown)="handleKeydown($event)"
    />
    
    <span class="checkbox-control">
      @if (checked() && !indeterminate()) {
        <i class="ph ph-check" aria-hidden="true"></i>
      }
      @if (indeterminate()) {
        <i class="ph ph-minus" aria-hidden="true"></i>
      }
    </span>

    <span class="checkbox-text">
      @if (label()) {
        {{ label() }}
      } @else {
        <ng-content></ng-content>
      }
    </span>
  </label>

  @if (error()) {
    <div [id]="uniqueId + '-error'" class="checkbox-message error" role="alert">
      {{ error() }}
    </div>
  }
  @if (success()) {
    <div [id]="uniqueId + '-success'" class="checkbox-message success" role="status">
      {{ success() }}
    </div>
  }
</div>
