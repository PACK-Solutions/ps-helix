<div class="select-container">
  @if (label()) {
    <label class="select-label" [attr.for]="selectId" (click)="focusSelect()">
      {{ label() }}
      @if (required()) { <span class="required-mark">*</span> }
    </label>
  }

  <div class="select-trigger" [id]="selectId" (click)="toggle()">
    <div class="select-value">
      <span [class.placeholder]="!hasValue()">
        {{ selectedLabel() }}
      </span>
    </div>
    <i class="ph ph-caret-down select-arrow" aria-hidden="true"></i>
  </div>

  @if (isOpen()) {
    <div class="select-dropdown">
      <div class="select-options">
        @for (item of options(); track getOptionKey(item)) {
          @if (isOptionGroup(item)) {
            <div class="select-group">
              <div class="select-group-label">{{ item.label }}</div>
              @for (opt of item.options; track opt.label) {
                <div class="select-option" 
                     [class.selected]="isSelected(opt)"
                     (click)="select(opt)">
                  {{ opt.label }}
                </div>
              }
            </div>
          } @else {
            <div class="select-option" 
                 [class.selected]="isSelected(item)"
                 (click)="select(item)">
              {{ item.label }}
            </div>
          }
        } @empty {
          <div class="select-no-results">Aucun résultat</div>
        }
      </div>
    </div>
  }
</div>
